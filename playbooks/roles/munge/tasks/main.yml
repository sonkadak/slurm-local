- name: Install Munge (RedHat-based)
  ansible.builtin.yum:
    name:
      - munge
    state: present
  when: ansible_os_family == "RedHat"

- name: Install Munge (Debian-based)
  ansible.builtin.apt:
    name:
      - munge
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Ensure Munge key directory exists
  ansible.builtin.file:
    path: /etc/munge
    state: directory
    owner: munge
    group: munge
    mode: '0700'

- name: Check if Munge key exists
  ansible.builtin.stat:
    path: /etc/munge/munge.key
  register: munge_key

- name: Generate Munge key on controller node
  ansible.builtin.command: /usr/sbin/create-munge-key
  when: inventory_hostname == groups['controller'][0] and not munge_key.stat.exists

- name: Read munge key from controller
  ansible.builtin.slurp:
    src: /etc/munge/munge.key
  delegate_to: "{{ groups['controller'][0] }}"
  run_once: true
  register: munge_key_content
  no_log: true

- name: Deploy munge key to non-controller nodes
  ansible.builtin.copy:
    content: "{{ munge_key_content.content | b64decode }}"
    dest: /etc/munge/munge.key
    owner: munge
    group: munge
    mode: '0400'
  when: inventory_hostname != groups['controller'][0]
  no_log: true

- name: Ensure munge key permissions are correct
  ansible.builtin.file:
    path: /etc/munge/munge.key
    owner: munge
    group: munge
    mode: '0400'

- name: Start and enable Munge service
  ansible.builtin.service:
    name: munge
    state: started
    enabled: yes
